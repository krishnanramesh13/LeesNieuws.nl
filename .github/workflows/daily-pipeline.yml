name: Daily News Pipeline

on:
  schedule:
    - cron: '0 5 * * *'  # Every day at 07:00 Amsterdam time (UTC+2)
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: |
          cd pipeline
          npm install

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: |
          cd pipeline
          node pipeline.js